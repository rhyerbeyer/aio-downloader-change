name: youtube-downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Enter YouTube URLs'
        required: true
      subtitles:
        description: 'Download Subtitles?'
        type: choice
        options: [none, fa, en, "fa,en"]
        default: none

permissions:
  contents: write

jobs:
  actions:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Write YouTube cookies
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube-cookies.txt
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Install tools
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/.local/bin/yt-dlp
          chmod a+rx ~/.local/bin/yt-dlp
          sudo apt-get update -qq && sudo apt-get install -y -qq jq ffmpeg zip

      - name: Download Process
        run: |
          mkdir -p youtube-content youtube
          # اینجا فرض بر این است که شما از دستور دانلود ساده استفاده می‌کنید 
          # برای تست یک نمونه ساده قرار داده شده، شما می‌توانید منطق پارس کردن خود را اینجا داشته باشید
          INPUT="${{ github.event.inputs.url }}"
          yt-dlp --cookies youtube-cookies.txt --no-progress -o "youtube-content/%(title)s.%(ext)s" "$INPUT"

      - name: Create split ZIP archives (99MB parts)
        run: |
          echo "Processing files for repository storage..."
          cd youtube-content
          for file in *; do
            if [ -f "$file" ]; then
              # فایل‌ها را به پارت‌های ۹۹ مگی تقسیم می‌کند تا گیت‌هاب ارور ندهد
              zip -j -s 99m "../youtube/${file}.zip" "$file"
            fi
          done
          cd ..

      # --- بخش جدید: ذخیره مستقیم در پوشه یوتیوب مخزن ---
      - name: Commit and Push to Repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add youtube/
          git commit -m "Add downloaded video: $(date)" || echo "No changes to commit"
          git push origin main

      # --- آپلود در آرتیفکت ---
      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: youtube-files
          path: youtube/

      # --- آپلود در ریلیز ---
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="yt-$(date +'%Y%m%d-%H%M%S')"
          gh release create "$TAG_NAME" youtube/* --title "Download $TAG_NAME" --notes "Files added to repo and release."
