name: youtube-downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: >
          Enter one or more YouTube URLs.
        required: true
        type: string
      output_format:
        description: 'Output format'
        required: false
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'
      video_quality:
        description: 'Max video resolution'
        required: false
        type: choice
        options:
          - '2160 (4K)'
          - '1080 (Full HD)'
          - '720 (HD)'
          - '480'
        default: '720 (HD)'
      preferred_language:
        description: 'Preferred audio language'
        required: false
        type: choice
        options:
          - 'Original (default)'
          - 'English'
          - 'Persian (فارسی)'
        default: 'Original (default)'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: '🔐 Prepare cookies'
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube-cookies.txt
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: '🛠️ Install tools'
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/.local/bin/yt-dlp
          chmod a+rx ~/.local/bin/yt-dlp
          sudo apt-get update -qq && sudo apt-get install -y -qq jq ffmpeg zip python3-pip
          pip3 install --quiet pytube youtube-dl

      - name: '⬇️ Download Process'
        id: primary_download
        run: |
          mkdir -p youtube
          # اینجا همان کد اصلی شما برای دانلود (yt-dlp و متغیرها) قرار می‌گیرد
          # برای اختصار، فرض می‌کنیم فایل‌ها در پوشه youtube دانلود می‌شوند
          INPUT="${{ github.event.inputs.url }}"
          # منطق پیچیده ی شما برای انتخاب کیفیت و زبان اینجا اجرا می‌شود...
          yt-dlp --cookies youtube-cookies.txt -o "youtube/%(title)s.%(ext)s" "$INPUT"

      - name: '✂️ Split ONLY oversized files (>99MB)'
        run: |
          OUTPUT_FOLDER="youtube"
          THRESH_MB=99
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))
          cd "$OUTPUT_FOLDER"
          for f in *; do
            [ -f "$f" ] || continue
            fs=$(stat -c%s "$f")
            if [ "$fs" -gt "$THRESH_BYTES" ]; then
              echo "✂️ Splitting $f because it is over 100MB..."
              zip -j -s "${THRESH_MB}m" "${f}.zip" "$f"
              rm "$f" # فایل اصلی حذف و پارت‌های زیپ جایگزین می‌شوند
            fi
          done
          cd ..

      - name: '📤 Push to repository'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube/
          git commit -m "⬇️ New YouTube Download" || echo "Nothing to commit"
          
          # تلاش برای Push کردن (با قابلیت Retry برای جلوگیری از تداخل)
          for i in {1..5}; do
            git pull --rebase origin main
            if git push origin main; then
              echo "✅ Files successfully pushed to repo!"
              break
            fi
            sleep 5
          done

      - name: '🧹 Cleanup'
        if: always()
        run: rm -f youtube-cookies.txt
