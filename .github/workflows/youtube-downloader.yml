name: youtube-to-repository

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Enter YouTube URLs (links or link v 1080)'
        required: true
        type: string
      subtitles:
        description: 'Download Subtitles?'
        type: choice
        options:
          - none
          - fa
          - en
          - fa,en
        default: 'fa,en'

permissions:
  contents: write

jobs:
  download_and_commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: '🛠️ Install Tools'
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/.local/bin/yt-dlp
          chmod a+rx ~/.local/bin/yt-dlp
          sudo apt-get update -qq && sudo apt-get install -y -qq jq ffmpeg zip

      - name: '🔐 Setup Cookies'
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube-cookies.txt
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: '⬇️ Download & Process'
        run: |
          mkdir -p youtube
          SUB_LANG="${{ github.event.inputs.subtitles }}"
          URLS="${{ github.event.inputs.url }}"
          
          # تنظیمات زیرنویس
          SUB_OPTS=""
          if [ "$SUB_LANG" != "none" ]; then
            SUB_OPTS="--write-subs --write-auto-subs --sub-langs $SUB_LANG --embed-subs"
          fi

          # دانلود فایل‌ها (با استفاده از متغیرهای ورودی)
          # برای سادگی و قدرت، از منطق دانلود مستقیم yt-dlp استفاده می‌کنیم
          echo "$URLS" | tr ',' '\n' | while read -r line; do
            [ -z "$line" ] && continue
            yt-dlp $SUB_OPTS --cookies youtube-cookies.txt \
              -f "bestvideo[height<=?1080]+bestaudio/best" \
              --merge-output-format mp4 \
              -o "youtube/%(title)s.%(ext)s" "$line" || echo "Failed to download $line"
          done

      - name: '✂️ Split ONLY oversized files (>99MB)'
        run: |
          cd youtube
          for f in *; do
            [ -e "$f" ] || continue
            # اگر فایل خودش یک پارت زیپ است یا پوشه است، رد کن
            [[ "$f" == *.zip* ]] && continue
            
            filesize=$(stat -c%s "$f")
            limit=$((99 * 1024 * 1024))
            
            if [ "$filesize" -gt "$limit" ]; then
              echo "📦 Splitting large file: $f"
              zip -j -s 99m "${f}.zip" "$f"
              rm "$f"
            else
              echo "✅ File okay (under 100MB): $f"
            fi
          done
          cd ..

      - name: '📤 Commit and Push to Repo'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube/
          git commit -m "Add new downloads: $(date +'%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          
          # ری‌بیس برای جلوگیری از کانفلیکت
          git pull --rebase origin main
          git push origin main
